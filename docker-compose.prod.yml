# Production — utilise les images publiées sur GHCR
# Usage :
#   GHCR_OWNER=coulibaly-b IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d
#
# Variables d'environnement à définir (via un fichier .env.prod ou en CLI) :
#   GHCR_OWNER   – votre utilisateur/org GitHub (ex : coulibaly-b)
#   IMAGE_TAG    – tag de l'image (ex : latest ou le SHA du commit)
#   DB_PASSWORD  – mot de passe PostgreSQL (ne pas laisser la valeur par défaut en prod)

services:
  postgres:
    image: postgres:16-alpine
    container_name: coulibaly_pos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pos_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER:-coulibaly-b}/pos-vente-backend:${IMAGE_TAG:-latest}
    container_name: coulibaly_pos_api
    restart: unless-stopped
    environment:
      DB_HOST: postgres        # ← nom du service Docker, pas localhost
      DB_PORT: 5432
      DB_NAME: pos_db
      DB_USER: pos_user
      DB_PASSWORD: ${DB_PASSWORD:-pos_secret}
      PORT: 3001
    networks:
      - pos_net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GHCR_OWNER:-coulibaly-b}/pos-vente-frontend:${IMAGE_TAG:-latest}
    container_name: coulibaly_pos_app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - pos_net
    depends_on:
      - backend

networks:
  pos_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
