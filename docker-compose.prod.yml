# ============================================================
#  Coulibaly & Frères — Point de Vente (POS)
#  Prérequis : Docker Desktop installé et démarré, c'est tout.
#
#  Installation en 2 commandes :
#
#    curl -o docker-compose.yml https://raw.githubusercontent.com/CouLiBaLy-B/pos-vente/main/docker-compose.prod.yml
#    docker compose up -d
#
#  Application disponible sur http://localhost
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: coulibaly_pos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/coulibaly-b/pos-vente-backend:latest
    container_name: coulibaly_pos_api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pos_db
      DB_USER: pos_user
      DB_PASSWORD: pos_secret
      PORT: 3001
    networks:
      - pos_net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/coulibaly-b/pos-vente-frontend:latest
    container_name: coulibaly_pos_app
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - pos_net
    depends_on:
      - backend

networks:
  pos_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
